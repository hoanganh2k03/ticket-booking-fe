<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán</title>
    <link rel="stylesheet" href="/assets/styles/customer/qrcode.css">
    <link rel="stylesheet" href="/assets/styles/components/navbar.css">
    <!-- SweetAlert2 -->
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.32/dist/sweetalert2.min.css" rel="stylesheet" />
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div style="padding: 10px 20px;" class="navbar" id="navbar-placeholder"></div>

    <div class="container">
        <div class="order-header">
            <h1>Chi tiết</h1>
            <p>Mã đơn hàng: <span id="order-id"></span></p>
            <p>Họ và tên: <span id="user-name"></span></p>
            <p>Trạng thái: <span id="order-status"></span></p>
            <p>Tổng tiền: <span id="total-amount"></span> VND</p>
        </div>

        <div class="payment-info">
            <h3>Thông tin thanh toán</h3>
            <p>Phương thức thanh toán: <span id="payment-method"></span></p>
            <p>Mã giao dịch: <span id="transaction-code"></span></p>
            <p>Trạng thái thanh toán: <span id="payment-status"></span></p>
        </div>

        <div class="match-info">
            <h3>Thông tin trận đấu</h3>
            <p>Đội: <span id="teams"></span></p>
            <p>Thời gian bắt đầu: <span id="match-time"></span></p>
        </div>

        <div class="order-details" id="order-details">
            <!-- Order details will be dynamically added here -->
        </div>

        <div class="total">
            Tổng số vé: <span id="total-items">0</span>
        </div>
    </div>

    <!-- Bootstrap JS and Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.32/dist/sweetalert2.all.min.js"></script>
    <script type="module" src="/js/services/customer/qrcode.js"></script>
    <script src="/js/components/navbar.js"></script>
</body>
</html>
