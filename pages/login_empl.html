<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Đăng nhập - Quản lý vé bóng đá</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;600;800&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.32/dist/sweetalert2.min.css" rel="stylesheet" />

  <style>
    * { box-sizing: border-box; }
    body, html {
      height: 100%;
      margin: 0;
      font-family: 'Nunito', sans-serif;
    }
    body {
      /* hình nền sân bóng đá */
      background: url('/assets/images/login.jpg') center/cover no-repeat fixed;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-wrapper {
      position: relative;
      width: 100%;
      max-width: 400px;
      margin: 2rem;
    }
    .glass-card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      color: #fff;
    }
    .glass-card h2 {
      font-weight: 800;
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .form-control {
      background: rgba(255,255,255,0.2);
      border: none;
      border-bottom: 1px solid rgba(255,255,255,0.5);
      border-radius: 0;
      color: #fff;
    }
    .form-control:focus {
      background: rgba(255,255,255,0.25);
      box-shadow: none;
      border-bottom-color: #0d6efd;
      color: #fff;
    }
    .form-label { color: rgba(255,255,255,0.8); }
    .btn-login {
      width: 100%;
      padding: 0.75rem;
      background: linear-gradient(135deg, #0062E6, #33AEFF);
      border: none;
      border-radius: 50px;
      font-weight: 600;
      transition: background 0.3s;
    }
    .btn-login:hover {
      background: linear-gradient(135deg, #004BB5, #009EDB);
    }
    .links {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      margin-top: 0.5rem;
    }
    .links a {
      color: #fff;
      text-decoration: none;
      opacity: 0.8;
    }
    .links a:hover { opacity: 1; }
  </style>
</head>
<body>

  <div class="login-wrapper">
    <div class="glass-card">
      <h2>Đăng Nhập</h2>
      <form id="login-form">
        <div class="mb-3">
          <label for="username" class="form-label">Tên đăng nhập</label>
          <input type="text" id="username" class="form-control" placeholder="Nhập tên đăng nhập" required>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Mật khẩu</label>
          <input type="password" id="password" class="form-control" placeholder="Nhập mật khẩu" required>
        </div>
        <div class="links">
          <div>
            <input type="checkbox" id="remember"/> 
            <label for="remember" style="opacity:0.8; cursor:pointer;">Ghi nhớ</label>
          </div>
          <a href="admin/forgot_password.html">Quên mật khẩu?</a>
        </div>
        <button type="submit" class="btn btn-login mt-4">Đăng Nhập</button>
      </form>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3"></div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.32/dist/sweetalert2.all.min.js"></script>
  <!-- <script src="/js/components/toast.js"></script> -->
  <script type="module" src="/js/services/login_emlp.js"></script>
</body>
</html>
