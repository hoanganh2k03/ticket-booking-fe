<div class="ticket-status-page">
    <style>
        :root {
            --bg: #f9fafb;
            --card-bg: #198754fff;
            --accent: #3b82f6;
            --accent-light: #93c5fd;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --radius: 0.75rem;
            --shadow: 0 2px 10px rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 2rem 0;
            background: var(--bg);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
        }

        .navbar {
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
            border-bottom-left-radius: var(--radius);
            border-bottom-right-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 1rem 2rem;
        }

        .navbar-brand {
            color: #09e37e!important;
            font-weight: 700;
            font-size: 1.5rem;
        }

        .filter-bar {
            background: var(--card-bg);
            padding: 0.75rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .filter-bar .form-control,
        .filter-bar .form-select {
            border: 1px solid #e5e7eb;
            border-radius: var(--radius);
            color: var(--text-primary);
        }

        .filter-bar .form-control:focus,
        .filter-bar .form-select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .btn-accent {
            background: var(--accent);
            color: #fff;
            border-radius: var(--radius);
            padding: 0.5rem 1rem;
            box-shadow: var(--shadow);
            transition: background 0.2s;
        }

        .btn-accent:hover {
            background: var(--accent-light);
        }

        .overview .card {
            background: var(--card-bg);
            border: none;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            transition: transform 0.2s;
        }

        .overview .card:hover {
            transform: translateY(-4px);
        }

        .card-title {
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 0.25rem;
        }

        .card-value {
            font-size: 2.25rem;
            font-weight: 700;
            color: var(--accent);
        }

        .chart-box {
            background: var(--card-bg);
            padding: 1rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .chart-box h6 {
            margin-bottom: 1rem;
            font-size: 1rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        table.dataTable {
            border: none;
            background: #fff;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
        }


        /* Trong thead, xóa background nguyên khối, dùng gradient */
        table.dataTable thead {
            background: linear-gradient(90deg, #3b82f6, #93c5fd);
        }

        table.dataTable thead th {
            color: #111827 !important;
            border: none;
        }

        /* Zebra stripes rõ ràng */
        table.dataTable tbody tr:nth-child(odd) {
            background: #f9fafb;
        }

        table.dataTable tbody tr:nth-child(even) {
            background: #fff;
        }

        /* Hover gradient */
        table.dataTable tbody tr:hover {
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.1), rgba(147, 197, 253, 0.1)) !important;
        }

        @media (max-width: 768px) {
            .overview .col-md-4 {
                margin-bottom: 1rem;
            }
        }

        /* Giữ khoảng cách giữa các nút trong btn-group */
        .filter-bar .btn-group .btn+.btn {
            margin-left: 0.5rem;
        }

        /* Đảm bảo nhóm nút không bị wrap xuống dòng */
        .filter-bar .btn-group {
            display: flex;
            flex-wrap: nowrap;
        }

        .filter-bar .row {
            align-items: center;
        }
    </style>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg mb-4">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="fa-solid fa-ticket me-2"></i>Ticket Dashboard</a>
            <div class="collapse navbar-collapse filter-bar" id="navbarFilters">
                <div class="ms-auto row gx-2 align-items-center">
                    <div class="col-auto">
                        <input type="date" id="startDate" class="form-control form-control-sm" placeholder="From">
                    </div>
                    <div class="col-auto">
                        <input type="date" id="endDate" class="form-control form-control-sm" placeholder="To">
                    </div>
                    <div class="col-auto">
                        <select id="matchSelect" class="form-select form-select-sm">
                            <option value="">All Matches</option>
                        </select>
                    </div>
                    <div class="col-auto ms-auto">
                        <div class="btn-group" role="group" aria-label="Ticket Status Actions">
                            <button id="applyFilter" class="btn btn-accent btn-sm">
                                <i class="fa-solid fa-filter me-1"></i>Filter
                            </button>
                            <button id="export-pdf-report" class="btn btn-outline-primary btn-sm">
                                <i class="fa-solid fa-file-pdf me-1"></i>PDF
                            </button>
                            <button id="export-excel-report" class="btn btn-outline-success btn-sm">
                                <i class="fa-solid fa-file-excel me-1"></i>Excel
                            </button>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Overview Cards -->
        <div class="row g-4 mb-5">
            <div class="col-md-4">
                <div class="card text-center">
                    <div class="card-body">
                        <div class="card-title"><i class="fa-solid fa-calendar-check me-1"></i>Total Matches</div>
                        <div id="totalMatches" class="card-value">0</div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-center">
                    <div class="card-body">
                        <div class="card-title"><i class="fa-solid fa-chart-line me-1"></i>Average Fill Rate</div>
                        <div id="avgFillRate" class="card-value">0%</div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-center">
                    <div class="card-body">
                        <div class="card-title"><i class="fa-solid fa-users me-1"></i>Total Sold</div>
                        <div id="totalSold" class="card-value">0</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Charts -->
        <div class="row g-5 mb-5">
            <div class="col-lg-6">
                <div class="chart-box">
                    <h6><i class="fa-solid fa-chart-bar me-2"></i>Fill Rate by Match</h6>
                    <canvas id="fillRateChart_T" height="200"></canvas>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="chart-box">
                    <h6><i class="fa-solid fa-chart-line me-2"></i>Daily Ticket Sales</h6>
                    <canvas id="dailySalesChart" height="200"></canvas>
                </div>
            </div>
        </div>

        <!-- Data Tables -->
        <div class="card p-3 mb-4">
            <ul class="nav nav-pills mb-3" id="tabNav">
                <li class="nav-item me-2"><button class="nav-link active" data-bs-toggle="tab"
                        data-bs-target="#matchesTab">Matches</button></li>
                <li class="nav-item"><button class="nav-link" data-bs-toggle="tab"
                        data-bs-target="#sectionsTab">Sections</button></li>
            </ul>
            <div class="tab-content">
                <div class="tab-pane fade show active" id="matchesTab">
                    <table id="matchesTable" class="table table-striped table-hover w-100"></table>
                </div>
                <div class="tab-pane fade" id="sectionsTab">
                    <table id="sectionsTable" class="table table-striped table-hover w-100"></table>
                </div>
            </div>
        </div>
    </div>
</div>
<script type="module" src="/js/pages/admin/reports/ticket-status.js"></script>
