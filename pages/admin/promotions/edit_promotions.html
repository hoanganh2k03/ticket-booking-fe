<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <title>Sửa Mã khuyến mãi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap 5 CSS & Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&display=swap">
  <style>
    /* Tổng quan */
    body {
      background: linear-gradient(135deg, #f7f9fc, #e2e8f0);
      font-family: 'Nunito', sans-serif;
    }

    .container {
      max-width: 1200px;
    }

    .card {
      border: none;
      border-radius: 1rem;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
    }

    /* Header Card */
    .card-header {
      background: linear-gradient(90deg, #003366, #005599);
      padding: 1.25rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #198754;
    }

    .btn-back {
      font-size: 1rem;
      color: #003366;
      background-color: #198754;
      border-color: #198754;
    }

    .btn-back:hover {
      background-color: #e2e6ea;
    }

    /* Panel thông tin bên trái */
    .info-panel {
      background: #198754;
      border: 1px solid #d1d9e6;
      border-radius: 0.75rem;
      padding: 2rem;
      margin-bottom: 1rem;
    }

    .info-label {
      font-size: 1rem;
      color: #666;
    }

    .info-value {
      font-size: 1rem;
      font-weight: 600;
      color: #003366;
    }

    /* Panel chỉnh sửa bên phải */
    .edit-panel {
      background: #198754;
      border: 1px solid #d1d9e6;
      border-radius: 0.75rem;
      padding: 2rem;
    }

    .edit-panel .form-label {
      font-weight: 600;
      color: #198754;
    }

    .edit-panel input[type="text"],
    .edit-panel input[type="number"],
    .edit-panel input[type="datetime-local"] {
      border-radius: 0.5rem;
      border: 1px solid #ced4da;
      box-shadow: none;
    }

    .edit-panel input:focus {
      border-color: #005599;
      box-shadow: 0 0 0 0.2rem rgba(0, 85, 153, 0.25);
    }

    /* Tabs */
    .nav-tabs {
      border-bottom: 2px solid #d1d9e6;
    }

    .nav-tabs .nav-link {
      font-size: 1rem;
      font-weight: 500;
      padding: 0.75rem 1.25rem;
      border: none;
      background: transparent;
      color: #198754;
    }

    .nav-tabs .nav-link.active {
      background: #e2edf7;
      color: #005599;
      border-radius: 0.5rem 0.5rem 0 0;
      box-shadow: inset 0 -3px 0 #005599;
    }

    /* List áp dụng */
    #appliedList li {
      font-size: 1rem;
      padding: 0.75rem 1.25rem;
    }

    #appliedList .badge {
      font-size: 0.9rem;
      padding: 0.5rem 0.75rem;
    }

    /* Template dòng cho "Theo Section" */
    #lineTemplate {
      display: none;
    }

    .line-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
      padding: 0.75rem;
      background: #f9fbfd;
      border: 1px solid #d1d9e6;
      border-radius: 0.5rem;
    }

    .line-row select {
      border-radius: 0.5rem;
      padding: 0.375rem;
      border: 1px solid #ced4da;
    }

    .remove-line {
      color: #d9534f;
      cursor: pointer;
      border: none;
      background: transparent;
    }

    .remove-line:hover {
      color: #c9302c;
    }
  </style>
</head>

<body>
  <div class="container py-4">
    <div class="card">
      <!-- Header -->
      <div class="card-header">
        <div class="header-title">
          <i class="bi bi-pencil-square me-2"></i>Sửa Mã khuyến mãi
        </div>
        <button class="btn btn-back" id="btnBack">
          <i class="bi bi-arrow-left"></i> Quay lại
        </button>
      </div>
      <!-- Card body -->
      <div class="card-body">
        <div class="row g-4">
          <!-- Panel thông tin bên trái -->
          <div class="col-lg-4">
            <div class="info-panel">
              <div class="mb-3">
                <div class="info-label">Mã khuyến mãi</div>
                <div class="info-value" id="infoPromoCode">PROMO123</div>
              </div>
              <div class="mb-3">
                <div class="info-label">Giảm</div>
                <div class="info-value" id="infoDiscount">10% (percentage)</div>
              </div>
              <div class="mb-3">
                <div class="info-label">Thời gian</div>
                <div class="info-value" id="infoTime">01/01/2025 - 12/31/2025</div>
              </div>
              <div class="mb-3">
                <div class="info-label">Trạng thái</div>
                <div class="info-value" id="infoStatus">Đang kích hoạt</div>
              </div>
              <div class="mb-3">
                <div class="info-label">Người tạo</div>
                <div class="info-value" id="infoUser">AdminUser</div>
              </div>
            </div>
          </div>
          <!-- Panel chỉnh sửa bên phải với form có validation -->
          <div class="col-lg-8">
            <form class="edit-panel needs-validation" id="editPromotionForm" novalidate>
              <div class="row g-3 mb-3">
                <div class="col-md-6">
                  <label for="end_time" class="form-label">Ngày kết thúc</label>
                  <input type="datetime-local" class="form-control" id="end_time" required>
                  <div class="invalid-feedback">
                    Vui lòng nhập ngày kết thúc.
                  </div>
                </div>
                <div class="col-md-6">
                  <label for="usage_limit" class="form-label">Số lượng mã</label>
                  <input type="number" class="form-control" id="usage_limit" required>
                  <div class="invalid-feedback">
                    Số lượng mã phải từ 1 đến 100000.
                  </div>
                </div>
              </div>
              <div class="mb-3">
                <label for="description" class="form-label">Mô tả</label>
                <input type="text" class="form-control" id="description" placeholder="Nhập mô tả chi tiết..." required>
                <div class="invalid-feedback">
                  Vui lòng nhập mô tả.
                </div>
              </div>
              <div id="extraFields"></div>
              <!-- Tabs -->
              <ul class="nav nav-tabs mb-3" id="promoTab" role="tablist">
                <li class="nav-item" role="presentation">
                  <button class="nav-link active" id="bulk-tab" data-bs-toggle="tab" data-bs-target="#bulkContent" type="button" role="tab">
                    Theo trận đấu
                  </button>
                </li>
                <li class="nav-item" role="presentation">
                  <button class="nav-link" id="section-tab" data-bs-toggle="tab" data-bs-target="#sectionContent" type="button" role="tab">
                    Theo khu vực
                  </button>
                </li>
              </ul>
              <div class="tab-content border border-top-0 p-3 mb-3">
                <!-- Bulk All Tab -->
                <div class="tab-pane fade show active" id="bulkContent" role="tabpanel" aria-labelledby="bulk-tab">
                  <div class="row align-items-end">
                    <div class="col-md-8">
                      <label for="bulk_match" class="form-label">Chọn trận đấu để áp dụng</label>
                      <select class="form-select" id="bulk_match" required>
                        <option value="">--Chọn trận đấu--</option>
                        <!-- Data sẽ load từ API -->
                      </select>
                      <div class="invalid-feedback">
                        Hãy chọn một trận đấu.
                      </div>
                    </div>
                    <div class="col-md-4 text-end">
                      <button class="btn btn-outline-success mt-4 w-100" id="btnBulkApply" type="button">
                        Áp dụng
                      </button>
                    </div>
                  </div>
                </div>
                <!-- Theo Section Tab -->
                <div class="tab-pane fade" id="sectionContent" role="tabpanel" aria-labelledby="section-tab">
                  <div class="row g-3">
                    <div class="col-md-6">
                      <label for="section_match" class="form-label">Chọn trận đấu</label>
                      <select class="form-select" id="section_match" required>
                        <option value="">--Chọn trận đấu--</option>
                        <!-- Options will be loaded via JS -->
                      </select>
                      <div class="invalid-feedback">
                        Hãy chọn trận đấu.
                      </div>
                    </div>
                    <div class="col-md-6">
                      <label for="section_section" class="form-label">Chọn khu vực</label>
                      <select class="form-select" id="section_section" required>
                        <option value="">--Chọn khu vực--</option>
                        <!-- Options will be loaded via JS -->
                      </select>
                      <div class="invalid-feedback">
                        Hãy chọn Section.
                      </div>
                    </div>
                  </div>
                  <div class="mt-3 text-end">
                    <button type="button" class="btn btn-outline-success" id="btnApplySection">
                      <i class="bi bi-check"></i> Áp dụng
                    </button>
                  </div>
                </div>
              </div>
              <!-- Danh sách áp dụng -->
              <div class="mb-3">
                <label class="form-label">Danh sách áp dụng</label>
                <ul class="list-group" id="appliedList">
                  <!-- Ví dụ hiển thị dòng -->
                </ul>
              </div>
              <!-- Nút Hủy / Cập nhật -->
              <div class="text-end mt-3">
                <button class="btn btn-secondary me-2" id="btnCancel" type="button">
                  <i class="bi bi-x-circle"></i> Hủy
                </button>
                <button class="btn btn-primary" id="btnUpdate" type="submit">
                  <i class="bi bi-check-circle"></i> Cập nhật
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Template dòng cho "Theo Section" -->
  <template id="lineTemplate">
    <div class="line-row">
      <div style="flex: 1;">
        <label class="form-label mb-1">Match</label>
        <select class="form-select match-sel"></select>
      </div>
      <div style="flex: 1;">
        <label class="form-label mb-1">Section</label>
        <select class="form-select section-sel"></select>
      </div>
      <button class="btn btn-outline-danger remove-line">
        <i class="bi bi-trash"></i>
      </button>
    </div>
  </template>

  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- File JS chứa toàn bộ logic -->
  <script type="module" src="/js/pages/admin/promotions/edit_promotions.js"></script>
</body>

</html>
