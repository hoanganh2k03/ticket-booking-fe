<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Cập nhật Giá Vé</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
</head>
<body>
  <div class="container py-5">
    <div class="card">
      <div class="card-header text-white bg-primary d-flex justify-content-between">
        <h4 class="mb-0"><i class="bi bi-pencil-square me-2"></i>Cập nhật Giá Vé</h4>
        <button type="button" class="btn btn-light" onclick="window.history.back()">
          <i class="bi bi-arrow-return-left"></i> Quay lại
        </button>
      </div>
      <div class="card-body">
        <form id="update-price-form">
          <div class="row g-3">
            <!-- Thông tin hiển thị -->
            <div class="col-md-6">
              <label class="form-label">Trận Đấu</label>
              <input type="text" id="match_description" class="form-control" readonly />
            </div>
            <div class="col-md-6">
              <label class="form-label">Sân Vận Động</label>
              <input type="text" id="stadium_name" class="form-control" readonly />
            </div>
            <div class="col-md-6">
              <label class="form-label">Khu Vực</label>
              <input type="text" id="section_name" class="form-control" readonly />
            </div>
            <div class="col-md-6">
              <label class="form-label">Thời Gian Thi Đấu</label>
              <input type="text" id="match_time" class="form-control" readonly />
            </div>
            <div class="col-md-6">
              <label class="form-label">Ngày Bán Hiện tại</label>
              <input type="text" id="sell_date" class="form-control" readonly />
            </div>
            <div class="col-md-6">
              <label class="form-label">Giá Hiện Tại</label>
              <input type="text" id="old_price" class="form-control" readonly />
            </div>

            <!-- Nhập liệu -->
            <div class="col-md-6">
              <label for="newPrice" class="form-label">Giá mới</label>
              <input type="number" class="form-control" id="newPrice" required />
            </div>
            <div class="col-md-6">
              <label for="effectiveDate" class="form-label">Ngày hiệu lực</label>
              <input type="datetime-local" class="form-control" id="effectiveDate" required />
            </div>
            
            <div class="col-md-12">
              <label for="reason" class="form-label">Lý do</label>
              <input type="text" class="form-control" id="reason" required />
            </div>

            <!-- Trường bị ẩn -->
            <input type="hidden" id="changedBy" />
          </div>

          <div class="mt-4">
            <button type="submit" class="btn btn-success">Lưu</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script type="module">
    import CONFIG from "../../../js/utils/settings.js";
    const BASE_URL = CONFIG.BASE_URL;
    const urlParams = new URLSearchParams(window.location.search);
    const pricingId = urlParams.get('pricing_id');
  
    // Hàm định dạng theo datetime-local
    function toDatetimeLocalString(date) {
      const pad = n => n.toString().padStart(2, '0');
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
    }
  
    let matchDateLocalStr = "";
  
    fetch(`${BASE_URL}/api/tickets/section-prices/${pricingId}/`)
      .then(res => res.json())
      .then(data => {
        document.getElementById('match_description').value = data.match_description;
        document.getElementById('stadium_name').value = data.stadium_name;
        document.getElementById('section_name').value = data.section_name;
  
        const matchDate = new Date(data.match_time);
        matchDateLocalStr = toDatetimeLocalString(matchDate);
  
        document.getElementById('match_time').value = matchDate.toLocaleString('vi-VN');
        document.getElementById('sell_date').value = new Date(data.sell_date).toLocaleDateString('vi-VN');
        document.getElementById('old_price').value = Number(data.price).toLocaleString('vi-VN');
        document.getElementById('newPrice').value = data.price;
  
        const now = new Date();
        const nowLocalStr = toDatetimeLocalString(now);
        const dateInput = document.getElementById("effectiveDate");
        dateInput.min = nowLocalStr;
        dateInput.max = matchDateLocalStr;
        dateInput.value = nowLocalStr;
      });
  
      document.getElementById("update-price-form").addEventListener("submit", function (event) {
  event.preventDefault();

  const new_price = document.getElementById("newPrice").value;
  const effective_date = document.getElementById("effectiveDate").value;
  const reason = document.getElementById("reason").value;
  let changed_by = localStorage.getItem("employee_id") || 3;

  const nowLocalStr = toDatetimeLocalString(new Date());

  // Kiểm tra giá trị nhập: chỉ cho phép số nguyên không có ký tự
if (!/^\d+$/.test(new_price)) {
  Swal.fire("Lỗi", "Giá mới chỉ được nhập số nguyên, không có dấu hoặc ký tự.", "warning");
  return;
}

const priceValue = parseInt(new_price, 10);
if (priceValue < 50000 || priceValue > 10000000) {
  Swal.fire("Lỗi", "Giá mới phải trong khoảng từ 50,000 đến 10,000,000 đ.", "warning");
  return;
}

// Kiểm tra ngày hiệu lực
if (effective_date < nowLocalStr) {
  Swal.fire("Lỗi", "Ngày hiệu lực không được nhỏ hơn thời gian hiện tại.", "warning");
  return;
}
if (effective_date >= matchDateLocalStr) {
  Swal.fire("Lỗi", "Ngày hiệu lực phải trước thời gian thi đấu.", "warning");
  return;
}


  const payload = {
    pricing: parseInt(pricingId),
    new_price,
    effective_date,
    reason,
    changed_by
  };

  fetch(`${BASE_URL}/api/tickets/price-histories/`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(payload)
  })
  .then(async response => {
    if (!response.ok) {
      const errorData = await response.json();
      console.error("Chi tiết lỗi từ server:", errorData);
      throw new Error("Lỗi khi gửi dữ liệu");
    }
    return response.json();
  })
  .then(data => {
    Swal.fire("Thành công", "Đã lưu lịch sử giá mới!", "success")
    .then(() => {
      window.location.href = `http://127.0.0.1:5500/pages/admin/base.html#tickets/tickets`;
    });
  })
  .catch(error => {
    console.error("Lỗi khi lưu lịch sử giá:", error);
    Swal.fire("Lỗi", "Không thể cập nhật lịch sử giá", "error");
  });
});

  </script>
</body>
</html>
