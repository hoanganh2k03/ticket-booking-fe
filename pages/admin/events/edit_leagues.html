<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Cập nhật Giải Đấu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
</head>
<body>

  <div class="container py-5">
    <div class="card">
      <div class="card-header text-white bg-primary d-flex justify-content-between">
        <h4 class="mb-0"><i class="bi bi-trophy-fill me-2"></i>Cập nhật Giải Đấu</h4>
        <button type="button" class="btn btn-light" onclick="window.history.back()">
          <i class="bi bi-arrow-return-left"></i> Quay lại
        </button>
        
      </div>
      <div class="card-body">
        <form id="editLeagueForm">
          <div class="row g-3">
            <div class="col-md-6">
              <label for="leagueName" class="form-label">Tên giải đấu</label>
              <input type="text" id="leagueName" class="form-control" required />
            </div>
            <div class="col-md-6">
              <label for="leagueType" class="form-label">Loại giải đấu</label>
              <select id="leagueType" class="form-select" required>
                <option value="0">Giải Vô địch quốc gia</option>
                <option value="1">Giải Đấu loại trực tiếp</option>
                <option value="2">Giải Giao hữu</option>
              </select>
            </div>
            <div class="col-md-6">
              <label for="startDate" class="form-label">Ngày bắt đầu</label>
              <input type="date" id="startDate" class="form-control" required />
            </div>
            <div class="col-md-6">
              <label for="endDate" class="form-label">Ngày kết thúc</label>
              <input type="date" id="endDate" class="form-control" required />
            </div>
          </div>

          <div class="text-end mt-4">
            <button type="submit" class="btn btn-success">
              <i class="bi bi-save2 me-1"></i> Cập nhật giải đấu
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <!-- Không đổi phần HTML form -->

<script type="module">
  import CONFIG from "../../../js/utils/settings.js";
  const BASE_URL = CONFIG.BASE_URL;

  const urlParams = new URLSearchParams(window.location.search);
  const leagueId = urlParams.get('id');

  const startDateInput = document.getElementById('startDate');
  const endDateInput = document.getElementById('endDate');

  // Tự động set min cho endDate khi thay đổi startDate
  startDateInput.addEventListener('change', () => {
    const startDate = new Date(startDateInput.value);
    if (!isNaN(startDate)) {
      const minEndDate = new Date(startDate);
      minEndDate.setMonth(minEndDate.getMonth() + 3);
      endDateInput.min = minEndDate.toISOString().split('T')[0];
    }
  });

  if (!leagueId) {
    Swal.fire('Lỗi', 'Không tìm thấy ID giải đấu!', 'error');
  } else {
    fetch(`${BASE_URL}/api/events/leagues/${leagueId}/`)
      .then(res => res.json())
      .then(league => {
        document.getElementById('leagueName').value = league.league_name;
        document.getElementById('leagueType').value = league.league_type;

        // Chỉ gán ngày nếu hợp lệ
        if (league.start_date && league.start_date !== "0000-00-00") {
          startDateInput.value = league.start_date;
          const startDate = new Date(league.start_date);
          if (!isNaN(startDate)) {
            const minEndDate = new Date(startDate);
            minEndDate.setMonth(minEndDate.getMonth() + 3);
            endDateInput.min = minEndDate.toISOString().split('T')[0];
          }
        }

        if (league.end_date && league.end_date !== "0000-00-00") {
          endDateInput.value = league.end_date;
        }
      })
      .catch(err => {
        console.error(err);
        Swal.fire('Lỗi', 'Không thể tải thông tin giải đấu', 'error');
      });
  }

  document.getElementById('editLeagueForm').addEventListener('submit', function (e) {
    e.preventDefault();

    const startDateVal = startDateInput.value;
    const endDateVal = endDateInput.value;
    
    
    const startDate = new Date(startDateVal);
    const endDate = new Date(endDateVal);
    const minEndDate = new Date(startDate);
    minEndDate.setMonth(minEndDate.getMonth() + 3);

    if (endDate < minEndDate) {
      Swal.fire('Lỗi', 'Ngày kết thúc phải cách ngày bắt đầu ít nhất 3 tháng.', 'error');
      return;
    }
    // ------------------
    
  const leagueNameVal = document.getElementById('leagueName').value.trim();


  const specialCharRegex = /[^a-zA-Z0-9\sÀ-ỹ]/;

  if (!leagueNameVal) {
    Swal.fire('Lỗi', 'Tên giải không được để trống.', 'error');
    return;
  }

  if (specialCharRegex.test(leagueNameVal)) {
    Swal.fire('Lỗi', 'Tên giải không được chứa ký tự đặc biệt.', 'error');
    return;
  }


    const updatedLeague = {
      league_name: document.getElementById('leagueName').value,
      league_type: parseInt(document.getElementById('leagueType').value),
      start_date: startDateVal,
      end_date: endDateVal
    };

    fetch(`${BASE_URL}/api/events/leagues/${leagueId}/`, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(updatedLeague)
    })
      .then(res => {
        if (!res.ok) {
          return res.text().then(text => { throw new Error(text); });
        }
        return res.json();
      })
      .then(data => {
        Swal.fire('Thành công', 'Đã cập nhật giải đấu!', 'success').then(() => {
          window.location.href = 'http://127.0.0.1:5500/pages/admin/base.html#events/leagues';
        });
      })
      .catch(err => {
        console.error('Lỗi chi tiết:', err);
        Swal.fire('Lỗi', `Cập nhật thất bại: ${err.message || err}`, 'error');
      });
  });
</script>

</body>
</html>
