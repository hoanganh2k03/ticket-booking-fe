<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Thêm Sân Vận Động</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
</head>
<body>
  <div class="container py-5">
    <div class="card">
      <div class="card-header bg-primary text-white d-flex justify-content-between">
        <h4 class="mb-0"><i class="bi bi-building me-2"></i>Thêm Sân Vận Động</h4>
        <button class="btn btn-light" onclick="window.history.back()">
          <i class="bi bi-arrow-return-left"></i> Quay lại
        </button>
      </div>
      <div class="card-body">
        <form id="stadiumForm">
          <div class="mb-3">
            <label class="form-label">Mã sân</label>
            <input type="text" class="form-control" name="stadium_code" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Tên sân</label>
            <input type="text" class="form-control" name="stadium_name" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Địa điểm</label>
            <input type="text" class="form-control" name="location" required />
          </div>

          <hr />
          <h5>Khu vực (Sections)</h5>
          <div id="sectionsContainer"></div>
          <button type="button" class="btn btn-secondary mt-2" onclick="addSection()">
            <i class="bi bi-plus-circle"></i> Thêm khu vực
          </button>

          <div class="text-end mt-4">
            <button type="submit" class="btn btn-success">
              <i class="bi bi-check-circle me-1"></i> Thêm sân
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script type="module">
    import CONFIG from "../../../js/utils/settings.js";
    const BASE_URL = CONFIG.BASE_URL;
  
    // Khai báo biến toàn cục (phải gắn vào window nếu muốn dùng ngoài module)
    window.sectionIndex = 0;
  
    // Hàm thêm khu vực
    window.addSection = function () {
      const container = document.getElementById("sectionsContainer");
      const sectionDiv = document.createElement("div");
      sectionDiv.className = "row g-2 mb-3";
      sectionDiv.innerHTML = `
        <div class="col-md-6">
          <input type="text" class="form-control" placeholder="Tên khu vực" name="section_name_${sectionIndex}" required>
        </div>
        <div class="col-md-4">
          <input type="number" class="form-control" placeholder="Sức chứa" name="capacity_${sectionIndex}" required min="1">
        </div>
        <div class="col-md-2">
          <button type="button" class="btn btn-danger w-100" onclick="this.closest('.row').remove()">
            <i class="bi bi-x-circle"></i>
          </button>
        </div>
      `;
      container.appendChild(sectionDiv);
      sectionIndex++;
    }
  
    // Xử lý submit form
    document.getElementById("stadiumForm").addEventListener("submit", async function (e) {
  e.preventDefault();
  const form = e.target;

  const stadium_code = form.stadium_code.value.trim();
  const stadium_name = form.stadium_name.value.trim();
  const location = form.location.value.trim();

  if (!stadium_code || !stadium_name || !location) {
    Swal.fire("Lỗi", "Vui lòng điền đầy đủ thông tin sân!", "error");
    return;
  }

  const sections = [];
  for (let i = 0; i < sectionIndex; i++) {
    const name = form[`section_name_${i}`]?.value;
    const capacity = form[`capacity_${i}`]?.value;
    if (name && capacity) {
      sections.push({ section_name: name, capacity: parseInt(capacity) });
    }
  }

  if (sections.length === 0) {
    Swal.fire("Lỗi", "Cần thêm ít nhất một khu vực!", "error");
    return;
  }

  const payload = {
    stadium_code,
    stadium_name,
    location,
    sections
  };

  try {
    const res = await fetch(`${BASE_URL}/api/events/stadiums/`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });

    const data = await res.json();

    if (res.ok) {
      Swal.fire("Thành công", "Sân vận động đã được thêm!", "success")
        .then(()  => window.location.href = 'http://127.0.0.1:5500/pages/admin/base.html#events/stadiums');
    } else {
      let errorMessage = "Đã xảy ra lỗi!";

      if (data.stadium_code && data.stadium_code[0].includes("already exists")) {
        errorMessage = "Mã sân vận động đã tồn tại.";
      } else if (data.stadium_name && data.stadium_name[0].includes("already exists")) {
        errorMessage = "Tên sân vận động đã tồn tại.";
      } else if (data.detail) {
        errorMessage = data.detail;
      }

      Swal.fire("Lỗi", errorMessage, "error");
    }
  } catch (error) {
    console.error("🔥 Error:", error);
    Swal.fire("Lỗi", "Không thể kết nối đến máy chủ!", "error");
  }
});

  </script>
  
  
</body>
</html>
