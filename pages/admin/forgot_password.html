<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quên Mật Khẩu</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style> body { font-family: 'Poppins', sans-serif; }</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-700 flex items-center justify-center p-4">
  <div class="relative bg-white/5 backdrop-blur-lg border border-white/20 rounded-3xl shadow-xl max-w-md w-full overflow-hidden">
    <!-- Decorative Background Shapes -->
    <div class="absolute inset-0 pointer-events-none">
      <div class="absolute -top-32 -left-32 w-64 h-64 bg-amber-500/20 rounded-full blur-2xl"></div>
      <div class="absolute -bottom-32 -right-32 w-72 h-72 bg-emerald-500/20 rounded-full blur-2xl"></div>
    </div>
    <div class="relative p-8">
      <!-- Step Indicators -->
      <div class="flex items-center justify-between mb-8">
        <div class="flex-1 text-center">
          <div class="w-10 h-10 mx-auto rounded-full bg-amber-400 text-slate-900 flex items-center justify-center">
            <i class="fas fa-envelope"></i>
          </div>
          <p class="mt-2 text-sm text-gray-300">Email</p>
        </div>
        <div class="w-10 h-px bg-white/30 mx-2"></div>
        <div class="flex-1 text-center">
          <div class="w-10 h-10 mx-auto rounded-full bg-white/20 text-gray-300 flex items-center justify-center">
            <i class="fas fa-key"></i>
          </div>
          <p class="mt-2 text-sm text-gray-300">OTP & mật khẩu</p>
        </div>
      </div>

      <form id="forgotForm" class="space-y-6">
        <!-- Step 1 -->
        <div id="step1">
          <h2 class="text-2xl font-semibold text-amber-400 text-center mb-4">Nhập Email</h2>
          <div class="relative">
            <input type="email" id="email" placeholder="example@domain.com" required
                   class="w-full pl-12 pr-4 py-3 rounded-xl bg-white/10 placeholder-gray-400 text-white focus:outline-none focus:ring-2 focus:ring-amber-400" />
            <i class="fas fa-envelope absolute left-4 top-1/2 transform -translate-y-1/2 text-amber-400"></i>
          </div>
          <button type="button" id="sendOtpBtn"
                  class="w-full mt-4 py-3 bg-amber-400 hover:bg-amber-500 rounded-xl text-slate-900 font-semibold transition flex items-center justify-center">
            <i class="fas fa-paper-plane mr-2"></i>Gửi mã OTP
          </button>
        </div>

        <!-- Step 2 -->
        <div id="step2" class="hidden">
          <h2 class="text-2xl font-semibold text-amber-400 text-center mb-4">Xác minh & Đổi mật khẩu</h2>
          <div class="space-y-4">
            <div class="relative">
              <input type="text" id="otp" placeholder="Mã OTP" required
                     class="w-full pl-12 pr-4 py-3 rounded-xl bg-white/10 placeholder-gray-400 text-white focus:outline-none focus:ring-2 focus:ring-amber-400" />
              <i class="fas fa-shield-alt absolute left-4 top-1/2 transform -translate-y-1/2 text-amber-400"></i>
            </div>
            <div class="relative">
              <input type="password" id="newPassword" placeholder="Mật khẩu mới" required
                     class="w-full pl-12 pr-4 py-3 rounded-xl bg-white/10 placeholder-gray-400 text-white focus:outline-none focus:ring-2 focus:ring-amber-400" />
              <i class="fas fa-lock absolute left-4 top-1/2 transform -translate-y-1/2 text-amber-400"></i>
            </div>
            <div class="relative">
              <input type="password" id="confirmPassword" placeholder="Xác nhận mật khẩu" required
                     class="w-full pl-12 pr-4 py-3 rounded-xl bg-white/10 placeholder-gray-400 text-white focus:outline-none focus:ring-2 focus:ring-amber-400" />
              <i class="fas fa-lock absolute left-4 top-1/2 transform -translate-y-1/2 text-amber-400"></i>
            </div>
            <button type="submit"
                    class="w-full py-3 bg-emerald-400 hover:bg-emerald-500 rounded-xl text-slate-900 font-semibold transition flex items-center justify-center">
              <i class="fas fa-check mr-2"></i>Xác nhận
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script type="module" src="/js/pages/admin/forgot_password.js"></script>
</body>
</html>
